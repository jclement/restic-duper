name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      - name: cross-compile all release targets
        run: |
          for os in linux darwin windows; do for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o /dev/null .
          done; done
      - run: go test -race ./...
      - name: goreleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
